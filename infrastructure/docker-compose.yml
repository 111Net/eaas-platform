services:
  backend:
    build: ../backend
    ports:
      - "8000:8000"

  frontend:
    build: ../frontend
    ports:
      - "3000:3000"

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: eaas
      POSTGRES_PASSWORD: eaas
      POSTGRES_DB: eaas
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"
