version: "3.9"

services:
  backend:
    image: yourdockerhub/eaas-backend:${TAG:-latest}
    restart: always
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: yourdockerhub/eaas-frontend:${TAG:-latest}
    restart: always
    ports:
      - "3000:80"

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
